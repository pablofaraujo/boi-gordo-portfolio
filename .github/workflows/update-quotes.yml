name: Update BGI Quotes

on:
  schedule:
    - cron: "*/30 12-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update quotes file
        run: node scripts/update-quotes.mjs
        env:
          QUOTE_SOURCE_URL: ${{ secrets.QUOTE_SOURCE_URL }}
          QUOTE_JSON: ${{ secrets.QUOTE_JSON }}

      - name: Commit updated quotes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Atualizar cotacoes BGI
          file_pattern: public/quotes.json
